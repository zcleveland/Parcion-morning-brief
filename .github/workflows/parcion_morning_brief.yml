name: Parcion Morning Brief

on:
  schedule:
    - cron: '0 13 * * 1-5'   # 6am PDT (Mar–Nov)
    - cron: '0 14 * * 1-5'   # 6am PST (Nov–Mar)
  workflow_dispatch:

jobs:
  send-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm 6am Pacific (skipped for manual runs)
        id: time_check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — skipping time check"
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ=America/Los_Angeles date +%-H)
            echo "Pacific hour: $HOUR"
            if [ "$HOUR" != "6" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Set up Python
        if: steps.time_check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.time_check.outputs.skip == 'false'
        run: |
          pip install feedparser anthropic markdown requests beautifulsoup4

      - name: Run morning brief
        if: steps.time_check.outputs.skip == 'false'
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          WORK_EMAIL:         ${{ secrets.WORK_EMAIL }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}
        run: python parcion_morning_brief.py
