name: Build Editor Page

on:
  push:
    branches: [main]
    paths:
      - 'docs/index.html'
  workflow_dispatch:

jobs:
  build-editor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Inject secrets into editor page
        env:
          EDITOR_PASSWORD: ${{ secrets.EDITOR_PASSWORD }}
          GITHUB_TOKEN_VAL: ${{ secrets.EDITOR_GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          sed -i "s|%%EDITOR_PASSWORD%%|${EDITOR_PASSWORD}|g" docs/index.html
          sed -i "s|%%GITHUB_OWNER%%|${REPO_OWNER}|g" docs/index.html
          sed -i "s|%%GITHUB_REPO%%|${REPO_NAME}|g" docs/index.html
          sed -i "s|%%GITHUB_TOKEN%%|${GITHUB_TOKEN_VAL}|g" docs/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
