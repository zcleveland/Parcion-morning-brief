name: Daily Brief

on:
  schedule:
    # ── Timing ────────────────────────────────────────────────────────────────
    # GitHub Actions uses UTC. Pacific time offsets:
    #   PDT (Mar–Nov, UTC-7):  6:00 AM PDT = 13:00 UTC  ← this file uses PDT
    #   PST (Nov–Mar, UTC-8):  6:00 AM PST = 14:00 UTC
    #
    # This cron fires at 13:00 UTC = 6:00 AM during daylight saving time.
    # In winter (Nov–Mar), it will fire at 5:00 AM Pacific instead.
    # If you want strict 6:00 AM PST in winter, change 13 → 14 below.
    # ──────────────────────────────────────────────────────────────────────────
    - cron: '0 13 * * 1-5'   # Weekdays only (Mon–Fri)
    # To run every day including weekends, change '1-5' to '*'

  # Adds a "Run workflow" button in the GitHub Actions tab for manual testing
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install required packages
        run: pip install feedparser anthropic markdown

      - name: Run daily briefing script
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          WORK_EMAIL:         ${{ secrets.WORK_EMAIL }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python daily_briefing.py
